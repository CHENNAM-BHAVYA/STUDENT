<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse | Premium Student Management</title>
    <!-- CSS is served at /css/style.css because public/ is the static root -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Loader -->
        <div class="loader-wrapper" id="loader">
            <div class="loader"></div>
        </div>
    </div>

    <!-- Login Page Template -->
    <template id="login-template">
        <div class="auth-page">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                    <h1>Welcome Back</h1>
                    <p>Enter your credentials to access EduPulse</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" placeholder="admin" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                    <div id="login-error" class="error-msg"></div>
                </form>
                <div class="auth-footer">
                    <p>Demo Account: <strong>admin / admin123</strong></p>
                </div>
            </div>
        </div>
    </template>

    <!-- Dashboard Layout Template -->
    <template id="dashboard-template">
        <div class="dashboard">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-graduation-cap"></i>
                    <span>EduPulse</span>
                </div>
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active" data-page="home"><i class="fas fa-th-large"></i> Dashboard</a>
                    <a href="#" class="nav-item" data-page="students"><i class="fas fa-user-graduate"></i> Students</a>
                    <a href="#" class="nav-item" data-page="faculty"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
                    <a href="#" class="nav-item" data-page="results"><i class="fas fa-poll"></i> Results</a>
                    <div class="nav-divider"></div>
                    <a href="#" class="nav-item" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </nav>
            </aside>
            <main class="main">
                <header class="top-bar">
                    <h2 id="page-title">Overview</h2>
                    <div class="user-profile">
                        <div class="user-info">
                            <span id="user-name">Admin</span>
                            <span id="user-role">Administrator</span>
                        </div>
                        <img src="https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff" alt="Avatar">
                    </div>
                </header>
                <div id="page-content" class="content"></div>
            </main>
        </div>
    </template>

    <!-- JS is served at /js/app.js because public/ is the static root -->
    <script src="/js/app.js"></script>
</body>
</html>
