<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS | Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Content will be injected here by app.js -->
    </div>

    <!-- Login Template -->
    <template id="login-template">
        <div class="login-container">
            <div class="login-card">
                <h2>Welcome Back</h2>
                <p>Login to manage your education</p>
                <form id="login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>
                <div id="login-error"
                    style="color: var(--danger); margin-top: 1rem; font-size: 0.85rem; text-align: center;"></div>
            </div>
        </div>
    </template>

    <!-- Dashboard Template -->
    <template id="dashboard-template">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-brand">
                    <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 8px;"></div>
                    EduPulse
                </div>
                <ul class="nav-links">
                    <li class="nav-item"><a href="#" class="nav-link active" data-page="home">Dashboard</a></li>
                    <li class="nav-item admin-only"><a href="#" class="nav-link" data-page="students">Students</a></li>
                    <li class="nav-item admin-only"><a href="#" class="nav-link" data-page="faculty">Faculty</a></li>
                    <li class="nav-item admin-only"><a href="#" class="nav-link" data-page="courses">Courses</a></li>
                    <li class="nav-item"><a href="#" class="nav-link" data-page="results">Results</a></li>
                    <li class="nav-item faculty-only"><a href="#" class="nav-link" data-page="attendance">Attendance</a>
                    </li>
                    <li class="nav-item faculty-only"><a href="#" class="nav-link" data-page="marks">Marks</a></li>
                    <li class="nav-item"><a href="#" class="nav-link" id="logout-btn">Logout</a></li>
                </ul>
            </aside>
            <main class="main-content">
                <header class="header">
                    <h1 id="page-title">Dashboard Overview</h1>
                    <div class="user-info">
                        <span id="display-name" style="font-weight: 600;"></span>
                        <span id="display-role"
                            style="font-size: 0.75rem; color: var(--text-muted); display: block; text-align: right;"></span>
                    </div>
                </header>
                <div id="page-content">
                    <!-- Dynamic Page Content -->
                </div>
            </main>
        </div>
    </template>

    <script src="js/app.js"></script>
</body>

</html>
